<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OtakuHub — Anime · Manga · Manhwa · Pixiv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⛩</span>
      <span class="logo-text">OtakuHub</span>
    </div>

    <ul class="sidebar-nav">
      <li><a href="#" class="nav-link active" data-view="home">
        <span class="nav-icon">🏠</span> Home
      </a></li>
      <li><a href="#" class="nav-link" data-view="trending-anime">
        <span class="nav-icon">📺</span> Trending Anime
      </a></li>
      <li><a href="#" class="nav-link" data-view="trending-manga">
        <span class="nav-icon">📖</span> Trending Manga
      </a></li>
      <li><a href="#" class="nav-link" data-view="seasonal">
        <span class="nav-icon">🌸</span> This Season
      </a></li>
      <li><a href="#" class="nav-link" data-view="top-mal">
        <span class="nav-icon">⭐</span> MAL Top Charts
      </a></li>
      <li><a href="#" class="nav-link" data-view="schedule">
        <span class="nav-icon">📅</span> Airing Schedule
      </a></li>
      <li><a href="#" class="nav-link" data-view="pixiv">
        <span class="nav-icon">🎨</span> Pixiv Art
      </a></li>
    </ul>

    <div class="sidebar-sources">
      <p class="sources-label">Live Sources</p>
      <div class="source-badge">MangaDex</div>
      <div class="source-badge">AniList</div>
      <div class="source-badge">MyAnimeList</div>
      <div class="source-badge pixiv">Pixiv</div>
    </div>
  </nav>

  <!-- ── Main ───────────────────────────────────────── -->
  <div class="main-wrap">

    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search anime, manga, artwork…"
          autocomplete="off"
        />
        <button id="searchBtn">Search</button>
      </div>
      <div class="topbar-right">
        <span class="source-status" id="statusBadge">● Live</span>
      </div>
    </header>

    <!-- Content area -->
    <main class="content" id="content">
      <!-- Loaded dynamically by app.js -->
      <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Loading…</p>
      </div>
    </main>

  </div>

  <!-- ── Detail Modal ───────────────────────────────── -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/render.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
